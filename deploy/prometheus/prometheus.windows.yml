# 在 Windows 宿主机运行 clash-exporter、Prometheus/Grafana 在容器内时使用。
# 容器内通过 host.docker.internal 访问宿主机上监听的 Exporter（默认 2112）。
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: clash_exporter
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:2112']
